services:
  mcad-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gestauto}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-mcad}
      CADASTRO_DB_PASSWORD: ${CADASTRO_DB_PASSWORD:?CADASTRO_DB_PASSWORD is required}
      IDENTIFICACAO_DB_PASSWORD: ${IDENTIFICACAO_DB_PASSWORD:?IDENTIFICACAO_DB_PASSWORD is required}
      ARRECADACAO_DB_PASSWORD: ${ARRECADACAO_DB_PASSWORD:?ARRECADACAO_DB_PASSWORD is required}
      DB_PASSWORD_DISTRIBUICAO: ${DB_PASSWORD_DISTRIBUICAO:?DB_PASSWORD_DISTRIBUICAO is required}
    volumes:
      - mcad_pg_data:/var/lib/postgresql/data
    configs:
      - source: postgres_00_create_app_schemas
        target: /docker-entrypoint-initdb.d/00-create-app-schemas.sql
      - source: postgres_01_create_schemas
        target: /docker-entrypoint-initdb.d/01-create-schemas.sql
      - source: postgres_02_setup_arrecadacao
        target: /docker-entrypoint-initdb.d/02-setup-arrecadacao-schema.sql
      - source: postgres_03_setup_distribuicao
        target: /docker-entrypoint-initdb.d/03-setup-distribuicao-schema.sql
    networks:
      - mcad-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  mcad-minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-mcadadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - mcad_minio_data:/data
    networks:
      - mcad-internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 0
      restart_policy:
        condition: on-failure
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.routers.mcad-minio.rule=Host(`minio.tasso.dev.br`)
      - traefik.http.routers.mcad-minio.entrypoints=websecure
      - traefik.http.routers.mcad-minio.tls=true
      - traefik.http.routers.mcad-minio.tls.certresolver=cloudflare-resolver
      - traefik.http.services.mcad-minio.loadbalancer.server.port=9000

  mcad-cadastro-api:
    image: ${CADASTRO_API_IMAGE:-mcad-cadastro-api:latest}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:5001
      CADASTRO_DB_HOST: mcad-postgres
      CADASTRO_DB_PORT: 5432
      CADASTRO_DB_NAME: ${POSTGRES_DB:-mcad}
      CADASTRO_DB_SCHEMA: cadastro
      CADASTRO_DB_USER: cadastro_svc
      CADASTRO_DB_PASSWORD: ${CADASTRO_DB_PASSWORD:?CADASTRO_DB_PASSWORD is required}
      CADASTRO_DB_SSL_MODE: Disable
      RABBITMQ_HOST: kebnekaise.lmq.cloudamqp.com
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-mcad}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-mcad}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-mcad}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}@kebnekaise.lmq.cloudamqp.com:5672/${RABBITMQ_VHOST:-mcad}
      OIDC_AUTHORITY: ${OIDC_AUTHORITY:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-mcad-frontend}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      ISWC_BASE_URL: ${ISWC_BASE_URL:-https://iswc.tasso.dev.br/}
      CORS_ALLOWED_ORIGINS: https://mcad.tasso.dev.br
    networks:
      - mcad-internal
      - traefik-public
    deploy:
      replicas: ${CADASTRO_API_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.mcad-cadastro.rule=Host(`${CADASTRO_API_HOST:-mcad-cadastro.tasso.dev.br}`)
        - traefik.http.routers.mcad-cadastro.entrypoints=websecure
        - traefik.http.routers.mcad-cadastro.tls=true
        - traefik.http.routers.mcad-cadastro.tls.certresolver=cloudflare-resolver
        - traefik.http.services.mcad-cadastro.loadbalancer.server.port=5001

  mcad-identificacao-api:
    image: ${IDENTIFICACAO_API_IMAGE:-mcad-identificacao-api:latest}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:5100
      IDENTIFICACAO_DB_HOST: mcad-postgres
      IDENTIFICACAO_DB_PORT: 5432
      IDENTIFICACAO_DB_NAME: ${POSTGRES_DB:-mcad}
      IDENTIFICACAO_DB_SCHEMA: identificacao
      IDENTIFICACAO_DB_USER: identificacao_svc
      IDENTIFICACAO_DB_PASSWORD: ${IDENTIFICACAO_DB_PASSWORD:?IDENTIFICACAO_DB_PASSWORD is required}
      IDENTIFICACAO_DB_SSL_MODE: Disable
      CADASTRO_API_BASE_URL: http://mcad-cadastro-api:5001/api/v1
      MINIO_ENDPOINT: mcad-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-mcadadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      RABBITMQ_HOST: kebnekaise.lmq.cloudamqp.com
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-mcad}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-mcad}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-mcad}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}@kebnekaise.lmq.cloudamqp.com:5672/${RABBITMQ_VHOST:-mcad}
      OIDC_AUTHORITY: ${OIDC_AUTHORITY:-}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-mcad-frontend}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://mcad.tasso.dev.br}
    networks:
      - mcad-internal
      - traefik-public
    deploy:
      replicas: ${IDENTIFICACAO_API_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.mcad-identificacao.rule=Host(`${IDENTIFICACAO_API_HOST:-mcad-identificacao.tasso.dev.br}`)
        - traefik.http.routers.mcad-identificacao.entrypoints=websecure
        - traefik.http.routers.mcad-identificacao.tls=true
        - traefik.http.routers.mcad-identificacao.tls.certresolver=cloudflare-resolver
        - traefik.http.services.mcad-identificacao.loadbalancer.server.port=5100

  mcad-arrecadacao-api:
    image: ${ARRECADACAO_API_IMAGE:-mcad-arrecadacao-api:latest}
    environment:
      SERVER_PORT: 5003
      ARRECADACAO_DB_HOST: mcad-postgres
      ARRECADACAO_DB_PORT: 5432
      ARRECADACAO_DB_NAME: ${POSTGRES_DB:-mcad}
      ARRECADACAO_DB_SCHEMA: arrecadacao
      ARRECADACAO_DB_USER: arrecadacao_svc
      ARRECADACAO_DB_PASSWORD: ${ARRECADACAO_DB_PASSWORD:?ARRECADACAO_DB_PASSWORD is required}
      ARRECADACAO_DB_SSL_MODE: disable
      RABBITMQ_HOST: kebnekaise.lmq.cloudamqp.com
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-brhqehoy}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-brhqehoy}
      OIDC_AUTHORITY: ${OIDC_AUTHORITY:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      ARRECADACAO_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://mcad.tasso.dev.br}
    networks:
      - mcad-internal
      - traefik-public
    deploy:
      replicas: ${ARRECADACAO_API_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.mcad-arrecadacao.rule=Host(`${ARRECADACAO_API_HOST:-mcad-arrecadacao.tasso.dev.br}`)
        - traefik.http.routers.mcad-arrecadacao.entrypoints=websecure
        - traefik.http.routers.mcad-arrecadacao.tls=true
        - traefik.http.routers.mcad-arrecadacao.tls.certresolver=cloudflare-resolver
        - traefik.http.services.mcad-arrecadacao.loadbalancer.server.port=5003

  mcad-distribuicao-api:
    image: ${DISTRIBUICAO_API_IMAGE:-mcad-distribuicao-api:latest}
    environment:
      SERVER_PORT: 5004
      DB_HOST: mcad-postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-mcad}
      DB_SCHEMA_DISTRIBUICAO: distribuicao
      DB_USER_DISTRIBUICAO: distribuicao_app
      DB_PASSWORD_DISTRIBUICAO: ${DB_PASSWORD_DISTRIBUICAO:?DB_PASSWORD_DISTRIBUICAO is required}
      RABBITMQ_HOST: kebnekaise.lmq.cloudamqp.com
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-mcad}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-mcad}
      OIDC_AUTHORITY: ${OIDC_AUTHORITY:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      DISTRIBUICAO_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://mcad.tasso.dev.br}
    networks:
      - mcad-internal
      - traefik-public
    deploy:
      replicas: ${DISTRIBUICAO_API_REPLICAS:-0}
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.mcad-distribuicao.rule=Host(`${DISTRIBUICAO_API_HOST:-mcad-distribuicao.tasso.dev.br}`)
        - traefik.http.routers.mcad-distribuicao.entrypoints=websecure
        - traefik.http.routers.mcad-distribuicao.tls=true
        - traefik.http.routers.mcad-distribuicao.tls.certresolver=cloudflare-resolver
        - traefik.http.services.mcad-distribuicao.loadbalancer.server.port=5004

  mcad-frontend:
    image: ${FRONTEND_IMAGE:-mcad-frontend:latest}
    environment:
      CADASTRO_API_BASE_URL: ${CADASTRO_API_BASE_URL:-https://mcad-cadastro.tasso.dev.br/api/v1}
      IDENTIFICACAO_API_BASE_URL: ${IDENTIFICACAO_API_BASE_URL:-https://mcad-identificacao.tasso.dev.br/api/v1}
      ARRECADACAO_API_BASE_URL: ${ARRECADACAO_API_BASE_URL:-https://mcad-arrecadacao.tasso.dev.br/api/v1}
      DISTRIBUICAO_API_BASE_URL: ${DISTRIBUICAO_API_BASE_URL:-https://mcad-distribuicao.tasso.dev.br/api/v1}
      AUDITORIA_API_BASE_URL: ${AUDITORIA_API_BASE_URL:-https://${BFF_HOST:-mcad-bff.tasso.dev.br}/api/auditoria/v1}
      OIDC_AUTHORITY: ${OIDC_AUTHORITY:?OIDC_AUTHORITY is required for frontend}
      OIDC_CLIENT_ID: ${FRONTEND_OIDC_CLIENT_ID:?FRONTEND_OIDC_CLIENT_ID is required}
      OIDC_AUDIENCE: ${FRONTEND_OIDC_AUDIENCE:-mcad-frontend}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-https://mcad.tasso.dev.br/callback}
      OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDC_POST_LOGOUT_REDIRECT_URI:-https://mcad.tasso.dev.br/logout}
    networks:
      - traefik-public
    deploy:
      replicas: ${FRONTEND_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.mcad-frontend.rule=Host(`${FRONTEND_HOST:-mcad.tasso.dev.br}`)
        - traefik.http.routers.mcad-frontend.entrypoints=websecure
        - traefik.http.routers.mcad-frontend.tls=true
        - traefik.http.routers.mcad-frontend.tls.certresolver=cloudflare-resolver
        - traefik.http.services.mcad-frontend.loadbalancer.server.port=80

  mcad-bff:
    image: ${BFF_IMAGE:-tassosgomes/mcad-bff:latest}
    environment:
      BFF_PORT: 5200
      BFF_HOST: 0.0.0.0
      CADASTRO_API_BASE_URL: http://mcad-cadastro-api:5001/api/v1
      IDENTIFICACAO_API_BASE_URL: http://mcad-identificacao-api:5100/api/v1
      ARRECADACAO_API_BASE_URL: http://mcad-arrecadacao-api:5003/api/v1
      DISTRIBUICAO_API_BASE_URL: http://mcad-distribuicao-api:5004/api/v1
      AUDITORIA_API_BASE_URL: ${AUDITORIA_API_BASE_URL:-https://api-audit.tasso.dev.br/api/v1}
    networks:
      - mcad-internal
      - traefik-public
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5200/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: ${BFF_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.mcad-bff.rule=Host(`${BFF_HOST:-mcad-bff.tasso.dev.br}`)
        - traefik.http.routers.mcad-bff.entrypoints=websecure
        - traefik.http.routers.mcad-bff.tls=true
        - traefik.http.routers.mcad-bff.tls.certresolver=cloudflare-resolver
        - traefik.http.services.mcad-bff.loadbalancer.server.port=5200

  mcad-identity-sync-api:
    image: ${IDENTITY_SYNC_API_IMAGE:-tassosgomes/mcad-identity-sync-api:latest}
    environment:
      IDENTITY_SYNC_PORT: 5300
      IDENTITY_SYNC_HOST: 0.0.0.0
      LOGTO_WEBHOOK_SYNC_KEY: ${LOGTO_WEBHOOK_SYNC_KEY:?LOGTO_WEBHOOK_SYNC_KEY is required}
      RABBITMQ_HOST: kebnekaise.lmq.cloudamqp.com
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-mcad}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-mcad}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-mcad}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}@kebnekaise.lmq.cloudamqp.com:5672/${RABBITMQ_VHOST:-mcad}
      IDENTITY_EVENTS_EXCHANGE: ${IDENTITY_EVENTS_EXCHANGE:-identity.events}
    networks:
      - mcad-internal
      - traefik-public
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5300/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      replicas: ${IDENTITY_SYNC_API_REPLICAS:-1}
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.mcad-identity-sync.rule=Host(`${IDENTITY_SYNC_API_HOST:-mcad-identity-sync.tasso.dev.br}`)
        - traefik.http.routers.mcad-identity-sync.entrypoints=websecure
        - traefik.http.routers.mcad-identity-sync.tls=true
        - traefik.http.routers.mcad-identity-sync.tls.certresolver=cloudflare-resolver
        - traefik.http.services.mcad-identity-sync.loadbalancer.server.port=5300

networks:
  mcad-internal:
    driver: overlay
    attachable: true
  traefik-public:
    external: true

volumes:
  mcad_pg_data:
  mcad_rmq_data:
  mcad_minio_data:

configs:
  postgres_00_create_app_schemas:
    external: true
    name: postgres_00_create_app_schemas
  postgres_01_create_schemas:
    external: true
    name: postgres_01_create_schemas
  postgres_02_setup_arrecadacao:
    external: true
    name: postgres_02_setup_arrecadacao
  postgres_03_setup_distribuicao:
    external: true
    name: postgres_03_setup_distribuicao
